<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Alpha Prime</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e;
  --gold-light: #e2c99a;
  --bg: #080810;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: #e8e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
}

/* Background */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background-image: url('assets/hero-ganesha.png');
  background-size: cover;
  background-position: center 30%;
  filter: brightness(.28) saturate(.5);
  animation: slow-drift 30s ease-in-out infinite alternate;
}
@keyframes slow-drift {
  from { transform: scale(1) translateX(0); }
  to   { transform: scale(1.06) translateX(-20px); }
}

/* Vignette */
.vignette {
  position: fixed; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(8,8,16,.85) 100%);
}

/* Gold line top */
.top-line {
  position: fixed; top: 0; left: 0; right: 0; height: 1px; z-index: 10;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}

/* Nav */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 24px 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 600; letter-spacing: 4px;
  color: #fff; text-decoration: none; text-transform: uppercase;
}
.logo span { color: var(--gold); }

/* Main content */
.content {
  position: relative; z-index: 5;
  text-align: center;
  padding: 40px;
}

/* 404 number */
.num-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 32px;
}
.num {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(140px, 22vw, 240px);
  font-weight: 300;
  line-height: 1;
  color: transparent;
  -webkit-text-stroke: 1px rgba(201,169,110,.25);
  letter-spacing: -8px;
  user-select: none;
  position: relative;
  z-index: 1;
}
.num-gold {
  position: absolute; inset: 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(140px, 22vw, 240px);
  font-weight: 300;
  line-height: 1;
  letter-spacing: -8px;
  color: var(--gold);
  opacity: .08;
  filter: blur(40px);
  z-index: 0;
}

/* Divider */
.divider {
  display: flex; align-items: center; gap: 20px;
  justify-content: center;
  margin-bottom: 28px;
}
.divider-line {
  width: 60px; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold));
}
.divider-line.r {
  background: linear-gradient(to left, transparent, var(--gold));
}
.divider-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gold);
}

/* Text */
.tag {
  font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px;
}
.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 300; line-height: 1.2;
  color: #fff; margin-bottom: 16px;
}
.title em { font-style: italic; color: var(--gold-light); }
.sub {
  font-size: 14px; font-weight: 300; line-height: 1.7;
  color: rgba(232,232,240,.5);
  max-width: 420px; margin: 0 auto 40px;
}

/* Buttons */
.actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.btn-primary {
  padding: 14px 36px;
  background: var(--gold); color: #080810;
  text-decoration: none;
  font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
  text-transform: uppercase; border-radius: 2px;
  transition: background .25s, transform .2s;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
.btn-ghost {
  padding: 14px 36px;
  border: 1px solid rgba(201,169,110,.4); color: var(--gold);
  text-decoration: none;
  font-size: 11px; font-weight: 400; letter-spacing: 2.5px;
  text-transform: uppercase; border-radius: 2px;
  transition: border-color .25s, transform .2s;
}
.btn-ghost:hover { border-color: var(--gold); transform: translateY(-2px); }

/* Floating ganesha glow */
.glow {
  position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 400px; z-index: 2;
  background: radial-gradient(ellipse, rgba(201,169,110,.06) 0%, transparent 70%);
  pointer-events: none;
  animation: glow-pulse 4s ease-in-out infinite alternate;
}
@keyframes glow-pulse {
  from { opacity: .5; }
  to   { opacity: 1; }
}

/* Particles */
.particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 1px; height: 1px;
  background: var(--gold); border-radius: 50%;
  animation: float-up linear infinite;
  opacity: 0;
}
@keyframes float-up {
  0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
  10%  { opacity: .6; }
  90%  { opacity: .2; }
  100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
}

/* Footer hint */
.footer-hint {
  position: fixed; bottom: 30px; left: 0; right: 0; z-index: 10;
  text-align: center;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(201,169,110,.3);
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="vignette"></div>
<div class="top-line"></div>
<div class="glow"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Nav -->
<nav class="nav">
  <a href="/" class="logo">Alpha <span>Prime</span></a>
</nav>

<!-- Content -->
<div class="content">
  <div class="num-wrap">
    <div class="num-gold">404</div>
    <div class="num">404</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line r"></div>
  </div>

  <div class="tag">Страница не найдена</div>
  <h1 class="title">Кажется, вы<br>заблудились на <em>Бали</em></h1>
  <p class="sub">
    Эта страница не существует или была перемещена.<br>
    Но мы всегда поможем найти правильный путь.
  </p>

  <div class="actions">
    <a href="/" class="btn-primary">На главную</a>
    <a href="https://wa.me/6281519845777" class="btn-ghost">Написать нам</a>
  </div>
</div>

<div class="footer-hint">Alpha Prime · Bali, Indonesia</div>

<script>
// Generate floating particles
const container = document.getElementById('particles');
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random() * 100}%;
    width: ${Math.random() < .3 ? 2 : 1}px;
    height: ${Math.random() < .3 ? 2 : 1}px;
    animation-duration: ${8 + Math.random() * 14}s;
    animation-delay: ${Math.random() * 12}s;
  `;
  container.appendChild(p);
}
</script>
</body>
</html>
